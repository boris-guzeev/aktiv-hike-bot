services:
  db:
    image: postgres:16
    container_name: aktivhike_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net
    ports:
      - 127.0.0.1:15432:5432

  migrate:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./internal/db/migrations:/migrations:ro
    entrypoint:
      [
        "sh",
        "-c",
        'migrate -path=/migrations -database "$${DB_DSN}" up || migrate -path=/migrations -database "$${DB_DSN}" up',
      ]
    environment:
      DB_DSN: ${DB_DSN}
    networks:
      - app_net

  admin-bot:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    container_name: admin_bot
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ADMIN_BOT_TOKEN: ${ADMIN_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      DB_DSN: ${DB_DSN}
      STORAGE_ROOT: ${STORAGE_ROOT}
      TZ: ${TZ}
    volumes:
      - hike_storage:${STORAGE_ROOT}
    restart: unless-stopped
    networks:
      - app_net

  client-bot:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    container_name: client_bot
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      CLIENT_BOT_TOKEN: ${CLIENT_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      DB_DSN: ${DB_DSN}
      STORAGE_ROOT: ${STORAGE_ROOT}
      TZ: ${TZ}
    volumes:
      - hike_storage:${STORAGE_ROOT}
    restart: unless-stopped
    networks:
      - app_net

volumes:
  db_data:
  hike_storage:

networks:
  app_net:
    driver: bridge
